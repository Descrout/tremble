<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Example projects for Tremble game engine.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="tremble_example">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <title>Tremble Examples</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #181818;
      font-family: monospace;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #181818;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      color: white;
      z-index: 99999;

      transition: opacity .3s;
    }

    .title {
      font-size: 42px;
      margin-bottom: 30px;
    }

    .bar {
      width: 300px;
      height: 12px;
      background: #333;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: #5df;
      animation: loadingBar 1.5s infinite ease-in-out;
    }

    .tip {
      margin-top: 15px;
      color: #aaa;
    }

    @keyframes loadingBar {
      0%   { width: 0%; }
      50%  { width: 100%; }
      100% { width: 0%; }
    }

    #loading {
      transition: opacity .3s;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div id="loading">
  <div class="title">Tremble Examples</div>

  <div class="bar">
    <div class="bar-fill"></div>
  </div>

  <div class="tip">
    Loading...
  </div>
</div>

<script src="flutter_bootstrap.js"></script>

<script>
  function hideLoading() {
    const loading = document.getElementById("loading");

    loading.classList.add("hidden");

    setTimeout(() => {
      loading.remove();
    }, 300);
  }

  window.addEventListener('flutter-first-frame', hideLoading);
</script>

</body>
</html>
